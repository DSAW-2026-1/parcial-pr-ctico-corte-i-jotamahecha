<!DOCTYPE html>
<html lang="es">
<head>

    <title>Esquinas con Flex y Grid</title>

    <!-- CONEXIÓN DEL CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- ESQUINA SUPERIOR IZQUIERDA -->
        <div class="corner">
            <div class="item header square"></div>
            <div class="item footer circle"></div>
        </div>

        <!-- ESQUINA SUPERIOR DERECHA -->

            <div class="item header square"></div>
            <div class="item footer circle"></div>
        </div>

        <!-- ESQUINA INFERIOR IZQUIERDA -->
        <div class="corner">
            <div class="item header circle"></div>
            <div class="item footer square"></div>
        </div>

        <!-- ESQUINA INFERIOR DERECHA -->
        <div class="corner">
            <div class="item header circle"></div>
            <div class="item footer square"></div>
        </div>

    </div>

</body>
