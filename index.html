<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Flexbox Shapes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- FILA SUPERIOR -->
    <div class="row top">
        <div class="group left">
            <div class="shape square"></div>
            <div class="shape circle"></div>
        </div>

        <div class="group right">
            <div class="shape circle"></div>
            <div class="shape square"></div>
        </div>
    </div>

    <!-- FILA INFERIOR -->
    <div class="row bottom">
        <div class="group left">
            <div class="shape circle"></div>
            <div class="shape square"></div>
        </div>

        <div class="group right">
            <div class="shape square"></div>
            <div class="shape circle"></div>
        </div>
    </div>

</div>

</body>
</html>
