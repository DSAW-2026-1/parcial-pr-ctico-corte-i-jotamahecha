<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Flexbox Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <header>
            <!-- Arriba izquierda -->
            <div class="group">
                <div class="shape square"></div>
                <div class="shape circle"></div>
            </div>

            <!-- Arriba derecha -->
            <div class="group">
                <div class="shape circle"></div>
                <div class="shape square"></div>
            </div>
        </header>

        <footer>
            <!-- Abajo izquierda -->
            <div class="group">
                <div class="shape circle"></div>
                <div class="shape square"></div>
            </div>

            <!-- Abajo derecha -->
            <div class="group">
                <div class="shape square"></div>
                <div class="shape circle"></div>
            </div>
        </footer>
    </main>

</body>
</html>
